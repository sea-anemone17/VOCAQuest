<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VOCA Quest - Archive</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <h1>🗂️ Archive</h1>
        <p class="subtitle">책 → 섹션 → 단어 순서로 구조를 정리합니다.</p>
      </div>
      <div class="button-row">
        <a class="button" href="./index.html">홈</a>
        <a class="button" href="./study.html">일반 학습</a>
        <a class="button" href="./trpg.html">TRPG</a>
      </div>
    </header>

    <section id="auth-guard" class="card hidden">로그인이 필요합니다. 홈으로 이동해 로그인해 주세요.</section>

    <main id="archive-app" class="route-grid hidden">
      <aside class="list-pane">
        <section class="card">
          <h2>책</h2>
          <div class="form-block">
            <input id="bookTitleInput" type="text" placeholder="새 책 제목" />
            <button id="addBookBtn" class="button primary" type="button">책 추가</button>
          </div>
          <div id="bookList" class="list-box" style="margin-top:12px;"></div>
        </section>

        <section class="card">
          <h2>섹션</h2>
          <div id="selectedBookInfo" class="muted small-note">책을 선택하세요.</div>
          <div class="form-block" style="margin-top:10px;">
            <input id="sectionTitleInput" type="text" placeholder="새 섹션 제목" />
            <button id="addSectionBtn" class="button primary" type="button">섹션 추가</button>
          </div>
          <div id="sectionList" class="list-box" style="margin-top:12px;"></div>
        </section>
      </aside>

      <section class="card">
        <h2>단어</h2>
        <div id="selectedSectionInfo" class="muted small-note">섹션을 선택하세요.</div>
        <div class="grid-2" style="margin-top:12px;">
          <label class="input-group">
            <span>검색</span>
            <input id="wordSearchInput" type="text" placeholder="단어/뜻/예문/메모" />
          </label>
          <label class="input-group">
            <span>필터</span>
            <select id="wordFilterFavorite">
              <option value="">전체</option>
              <option value="favorite">즐겨찾기만</option>
            </select>
          </label>
        </div>

        <form id="wordForm" class="form-block" style="margin-top:16px;">
          <div class="grid-2">
            <label class="input-group"><span>단어</span><input id="wordInput" type="text" required /></label>
            <label class="input-group"><span>품사</span><select id="posSelect"></select></label>
          </div>
          <div class="grid-2">
            <label class="input-group"><span>정서</span><select id="toneSelect"></select></label>
            <label class="input-group"><span>태그</span><select id="tagSelect"></select></label>
          </div>
          <label class="input-group"><span>뜻 (줄바꿈으로 구분)</span><textarea id="meaningsInput"></textarea></label>
          <label class="input-group"><span>예문</span><input id="exampleInput" type="text" /></label>
          <label class="input-group"><span>메모</span><textarea id="memoInput"></textarea></label>
          <div class="button-row">
            <button id="saveWordBtn" class="button primary" type="submit">저장</button>
            <button id="cancelEditBtn" class="button hidden" type="button">수정 취소</button>
          </div>
        </form>

        <div id="wordList" class="list-box" style="margin-top:18px;"></div>
      </section>
    </main>
  </div>
  <script type="module" src="./src/pages/archive.js"></script>
</body>
</html>
