<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VOCA Quest</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="app-shell">
    <div id="loading-message" class="auth-wrap card">세션을 확인하는 중입니다…</div>

    <section id="auth-screen" class="auth-wrap hidden">
      <div class="card hero-card">
        <div>
          <h1>📚 VOCA Quest</h1>
          <p class="subtitle">단어 아카이브 + 일반 학습 + TRPG를 한 흐름으로 묶은 단어 퀘스트 앱</p>
        </div>
        <div class="form-block">
          <label class="input-group">
            <span>이메일</span>
            <input id="email" type="email" placeholder="이메일을 입력하세요" />
          </label>
          <label class="input-group">
            <span>비밀번호</span>
            <input id="password" type="password" placeholder="비밀번호를 입력하세요" />
          </label>
          <div class="button-row">
            <button id="login-btn" class="button primary" type="button">로그인</button>
            <button id="signup-btn" class="button" type="button">회원가입</button>
          </div>
          <div id="auth-message" class="muted small-note"></div>
          <div class="footer-links">
            <a href="./terms.html">이용약관</a>
            <a href="./privacy.html">개인정보처리방침</a>
          </div>
        </div>
      </div>
    </section>

    <main id="app-screen" class="hidden">
      <header class="topbar">
        <div>
          <h1>📚 VOCA Quest</h1>
          <p class="subtitle">데이터는 로컬과 Supabase에 함께 저장됩니다.</p>
        </div>
        <div class="button-row">
          <span id="user-info" class="muted small-note"></span>
          <button id="logout-btn" class="button ghost" type="button">로그아웃</button>
        </div>
      </header>

      <section class="card">
        <div class="stats-box">
          <div class="stat-item"><span class="stat-label">책</span><strong id="bookCount">0</strong></div>
          <div class="stat-item"><span class="stat-label">섹션</span><strong id="sectionCount">0</strong></div>
          <div class="stat-item"><span class="stat-label">단어</span><strong id="wordCount">0</strong></div>
          <div class="stat-item"><span class="stat-label">최근 학습</span><strong id="recordCount">0</strong></div>
        </div>
      </section>

      <section class="grid-3" style="margin-top:16px;">
        <a class="card" href="./archive.html">
          <h2>아카이브</h2>
          <p class="muted">책/섹션/단어를 정리하고 수정합니다.</p>
        </a>
        <a class="card" href="./study.html">
          <h2>일반 학습</h2>
          <p class="muted">방향 전환, 오답 복습, 즐겨찾기 복습이 가능합니다.</p>
        </a>
        <a class="card" href="./trpg.html">
          <h2>TRPG</h2>
          <p class="muted">시나리오 진행과 단어 학습을 연결합니다.</p>
        </a>
      </section>
    </main>
  </div>

  <script type="module" src="./src/pages/home.js"></script>
</body>
</html>
